<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  #loader {
    position: relative;
    width: 100%;
    min-height: 520px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: "Helvetica Neue", sans-serif;
    padding-top: 60px;
  }
  .orbit-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(61, 34, 6, 0.12);
  }
  .r1 {
    width: 280px;
    height: 280px;
  }
  .r2 {
    width: 360px;
    height: 360px;
    border-color: rgba(61, 34, 6, 0.07);
  }
  .char-img {
    position: relative;
    z-index: 5;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid #fff;
    outline: 2px solid rgba(61, 34, 6, 0.15);
    opacity: 0;
    transform: scale(0.85);
    animation: popIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
  }
  .orbit-text {
    position: absolute;
    width: 320px;
    height: 320px;
    animation: spin 12s linear infinite;
    opacity: 0;
    animation-delay: 1.2s;
    animation-fill-mode: forwards;
  }
  .orbit-text2 {
    position: absolute;
    width: 420px;
    height: 420px;
    animation: spinReverse 18s linear infinite;
    opacity: 0;
    animation-delay: 1.4s;
    animation-fill-mode: forwards;
  }
  .text-group {
    position: absolute;
    inset: 0;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.2s forwards;
  }
  .text-group2 {
    position: absolute;
    inset: 0;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.4s forwards;
  }
  .bottom-info {
    position: absolute;
    bottom: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.8s forwards;
  }
  .name-tag {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #888;
    text-transform: uppercase;
  }
  .progress-track {
    width: 120px;
    height: 1px;
    background: #eee;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #3d2206;
    animation: fill 2.2s cubic-bezier(0.4, 0, 0.2, 1) 1.8s forwards;
    width: 0%;
  }
  .sub-label {
    position: absolute;
    top: 32px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: #bbb;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.6s forwards;
  }
  .main-title {
    position: absolute;
    top: 56px;
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: #1a1a1a;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.8s ease 0.9s forwards;
  }
  @keyframes popIn {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }
  @keyframes spin {
    0% {
      transform: rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: rotate(360deg);
      opacity: 1;
    }
  }
  @keyframes spinReverse {
    0% {
      transform: rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: rotate(-360deg);
      opacity: 1;
    }
  }
  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes fill {
    to {
      width: 100%;
    }
  }
  .fading {
    animation: fadeOut 0.7s ease forwards !important;
  }
  @keyframes fadeOut {
    to {
      opacity: 0;
    }
  }
</style>
